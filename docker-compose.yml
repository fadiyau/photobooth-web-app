services:
  app:
    build: .
    container_name: photobooth_app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.local

  nginx:
    image: nginx:alpine
    container_name: photobooth_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app